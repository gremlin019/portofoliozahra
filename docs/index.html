  <style>
    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --navy: #1e3a5f;
      --white: #ffffff;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --font-display: 'Segoe UI', sans-serif;
      --shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    body { font-family: var(--font-display); }
    .fw-500 { font-weight: 500; }
    .fw-600 { font-weight: 600; }
    .btn-primary-zahra {
      background: var(--blue-600);
      color: white;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      transition: background .2s;
    }
    .btn-primary-zahra:hover { background: var(--blue-700); color: white; }
    .btn-outline-zahra {
      border: 2px solid var(--blue-600);
      color: var(--blue-600);
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all .2s;
    }
    .btn-outline-zahra:hover { background: var(--blue-600); color: white; }
    .sosmed-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--blue-100);
      color: var(--blue-600);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all .2s;
    }
    .sosmed-btn:hover { background: var(--blue-600); color: white; }
  </style>

  
<style>
  /* ─── Hero Section ─── */
  .hero-section {
    min-height: calc(100vh - 70px);
    display: flex;
    align-items: center;
    background: linear-gradient(145deg, var(--blue-50) 0%, var(--white) 60%, var(--blue-100) 100%);
    position: relative;
    overflow: hidden;
  }

  /* Dekorasi lingkaran */
  .hero-section::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--blue-200) 0%, transparent 70%);
    top: -150px;
    right: -100px;
    opacity: .45;
    pointer-events: none;
  }

  .hero-section::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--blue-300) 0%, transparent 70%);
    bottom: -80px;
    left: -60px;
    opacity: .25;
    pointer-events: none;
  }

  /* Foto profil */
  .profile-photo-wrap {
    position: relative;
    display: inline-block;
  }

  .profile-photo {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid var(--white);
    box-shadow: 0 8px 32px rgba(37, 99, 235, .22);
  }

  /* Placeholder jika belum ada foto */
  .profile-photo-placeholder {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6rem;
    color: var(--white);
    border: 5px solid var(--white);
    box-shadow: 0 8px 32px rgba(37, 99, 235, .22);
  }

  /* Dot dekoratif di foto */
  .profile-photo-wrap .badge-status {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: #22c55e;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 3px solid var(--white);
  }

  /* Nama & tagline */
  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--navy);
    line-height: 1.15;
    margin-bottom: .4rem;
  }

  .hero-tagline {
    color: var(--blue-600);
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .hero-location {
    color: var(--gray-500);
    font-size: .95rem;
  }

  /* Nav card (halaman lain) */
  .nav-card {
    background: var(--white);
    border: 2px solid var(--blue-100);
    border-radius: 14px;
    padding: 1rem 1.4rem;
    text-decoration: none;
    color: var(--gray-700);
    display: flex;
    align-items: center;
    gap: .8rem;
    transition: all .25s;
    font-weight: 500;
  }

  .nav-card:hover {
    border-color: var(--blue-500);
    color: var(--blue-700);
    background: var(--blue-50);
    transform: translateX(6px);
    box-shadow: var(--shadow);
  }

  .nav-card .nav-icon {
    font-size: 1.4rem;
    color: var(--blue-500);
    min-width: 28px;
  }

  /* Sosmed strip */
  .sosmed-strip {
    display: flex;
    gap: .6rem;
    flex-wrap: wrap;
    margin-top: 1.2rem;
  }

  /* Animasi masuk */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .anim-1 { animation: fadeUp .6s ease both; }
  .anim-2 { animation: fadeUp .6s .15s ease both; }
  .anim-3 { animation: fadeUp .6s .3s ease both; }
</style>
