<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Portofolio{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --navy: #1e3a5f;
      --white: #ffffff;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --font-display: 'Segoe UI', sans-serif;
      --shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    body { font-family: var(--font-display); }
    .fw-500 { font-weight: 500; }
    .fw-600 { font-weight: 600; }
    .btn-primary-zahra {
      background: var(--blue-600);
      color: white;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      transition: background .2s;
    }
    .btn-primary-zahra:hover { background: var(--blue-700); color: white; }
    .btn-outline-zahra {
      border: 2px solid var(--blue-600);
      color: var(--blue-600);
      padding: .6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all .2s;
    }
    .btn-outline-zahra:hover { background: var(--blue-600); color: white; }
    .sosmed-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--blue-100);
      color: var(--blue-600);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all .2s;
    }
    .sosmed-btn:hover { background: var(--blue-600); color: white; }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" style="background: white; box-shadow: var(--shadow); position: sticky; top:0; z-index:999;">
    <div class="container">
      <a class="navbar-brand fw-600" style="color:var(--navy);" href="{% url 'home' %}">Portofolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'skills' %}">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'projects' %}">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if messages %}
    <div class="container mt-3">
      {% for msg in messages %}
        <div class="alert alert-info">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- Konten utama -->
  {% block content %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
